<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resell Tracker – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060d14;
      color: #e2e8f0;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #0c1520;
      border: 1px solid #1e2d42;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      width: 360px;
    }
    .logo-wrap { margin-bottom: 28px; }
    .logo { width: 72px; border-radius: 12px; }
    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 8px;
      color: #e2e8f0;
    }
    .brand span { color: #4ade80; }
    p {
      color: #475569;
      font-size: 13px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      width: 100%;
      justify-content: center;
    }
    .discord-btn:hover { background: #4752c4; }
    .discord-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .footer-note {
      margin-top: 24px;
      color: #334155;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="LogoJan.png" alt="Logo" class="logo">
    </div>
    <div class="brand">Resell<span>.</span>Tracker</div>
    <p>Melde dich mit Discord an, um deine Produkte zu verwalten.</p>
    <a href="/auth/discord" class="discord-btn">

      </svg>
      Mit Discord anmelden
    </a>
    <div class="footer-note">Resell Tracker · Nur für autorisierte Nutzer</div>
  </div>
</body>
</html>
