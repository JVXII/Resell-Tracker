<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resell Tracker</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0f1117;color:#e6e6e6;margin:0;padding:30px}
.container{max-width:1100px;margin:auto}
h1{margin-bottom:20px}
.card{background:#161b22;padding:20px;border-radius:14px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
input,select,button{padding:10px;border-radius:8px;border:1px solid #30363d;background:#0f1117;color:white}
button{background:#4f46e5;border:none;cursor:pointer}
button:hover{opacity:.9}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #30363d;text-align:left}
th{background:#0d1117}
img{width:50px;height:50px;object-fit:cover;border-radius:6px}
.status-Gekauft{color:#ff6b6b;font-weight:700}
.status-Lager{color:#ffa500;font-weight:700}
.status-Verkauft{color:#2ed573;font-weight:700}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.stat{background:#161b22;padding:15px;border-radius:12px}
.filterButtons button{margin-right:10px;margin-bottom:10px}
.topbar{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.search{margin-left:auto}

#loginScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0f1117;display:flex;align-items:center;justify-content:center}
.loginBox{background:#161b22;padding:40px;border-radius:14px;text-align:center;width:320px}
.loginBox input{width:100%;margin-top:10px;margin-bottom:15px}
.error{color:#ff6b6b;font-size:14px}
</style>
</head>
<body>

<div id="loginScreen">
<div class="loginBox">
<h2>Login</h2>
<p>Resell Tracker Zugriff</p>
<input type="password" id="password" placeholder="Passwort">
<button onclick="login()">Einloggen</button>
<p id="error" class="error"></p>
</div>
</div>

<div class="container" id="app" style="display:none">
<h1>Resell Tracker</h1>

<div class="topbar">
<button onclick="downloadBackup()">⬇ Backup herunterladen</button>
<button onclick="document.getElementById('backupFile').click()">⬆ Backup hochladen</button>
<input type="file" id="backupFile" accept=".csv" style="display:none" onchange="uploadBackup(event)">

<input class="search" id="search" placeholder="🔎 Suche Bestellnummer..." oninput="render()">
</div>

<div class="dashboard">
<div class="stat">Gesamtprofit: <b id="totalProfit">0€</b></div>
<div class="stat">Verkaufte Artikel: <b id="soldCount">0</b></div>
<div class="stat">Artikel im Lager: <b id="stockCount">0</b></div>
<div class="stat">Kapital im Lager: <b id="stockValue">0€</b></div>
</div>

<div class="card">
<h3>Artikel hinzufügen / bearbeiten</h3>
<div class="grid">
<select id="platform">
<option value="eBay">eBay</option>
<option value="Kleinanzeigen">Kleinanzeigen</option>
</select>
<input id="order" placeholder="Bestellnummer">
<input id="date" type="date">
<input id="buyPrice" type="number" placeholder="Einkaufspreis €">
<select id="status">
<option value="Gekauft">Gekauft</option>
<option value="Lager">Lager</option>
<option value="Verkauft">Verkauft</option>
</select>
<input id="sellPrice" type="number" placeholder="Verkaufspreis €">
<input id="image" type="file" accept="image/*">
<button onclick="saveItem()">Speichern</button>
</div>
</div>



<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
<h3 style="margin:0;">Artikel Übersicht</h3>
<div class="filterButtons">
<button onclick="setFilter('all')">Alle</button>
<button onclick="setFilter('Lager')">Lager</button>
<button onclick="setFilter('Verkauft')">Verkauft</button>
<button onclick="setFilter('Gekauft')">Gekauft</button>
</div>
</div>
<table>
<thead>
<tr>
<th>Bild</th>
<th>Plattform</th>
<th>Bestellnummer</th>
<th>Datum</th>
<th>Einkauf</th>
<th>Status</th>
<th>Verkauf</th>
<th>Profit</th>
<th>Aktionen</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="card">
<h3>Monatsstatistik (Profit)</h3>
<canvas id="chart" height="100"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

const PASSWORD="resell123";
let editIndex=null;

// Element references (avoid conflicts with reserved globals like `status`)
const platformEl = document.getElementById('platform');
const orderEl = document.getElementById('order');
const dateEl = document.getElementById('date');
const buyPriceEl = document.getElementById('buyPrice');
const statusEl = document.getElementById('status');
const sellPriceEl = document.getElementById('sellPrice');
const imageEl = document.getElementById('image');
const searchEl = document.getElementById('search');
const tableBodyEl = document.getElementById('tableBody');

function login(){
const input=password.value;
if(input===PASSWORD){
localStorage.setItem("loggedIn",true);
loginScreen.style.display='none';
app.style.display='block';
}else error.innerText="Falsches Passwort";
}

if(localStorage.getItem("loggedIn")){
loginScreen.style.display='none';
app.style.display='block';
}

let items=JSON.parse(localStorage.getItem('resellItems')||'[]');
let filter='all';

function save(){
localStorage.setItem('resellItems',JSON.stringify(items));
render();
}

function saveItem(){
const file=imageEl.files[0];
const reader=new FileReader();

reader.onload=function(){
const item={
platform:platformEl.value,
order:orderEl.value,
date:dateEl.value,
buy:parseFloat(buyPriceEl.value)||0,
status:statusEl.value,
sell:parseFloat(sellPriceEl.value)||0,
image:reader.result||items[editIndex]?.image||''
};

if(editIndex!==null){
items[editIndex]=item;
editIndex=null;
}else items.push(item);

clearForm();
save();
}

if(file)reader.readAsDataURL(file);else reader.onload();
}

function clearForm(){
orderEl.value="";
dateEl.value="";
buyPriceEl.value="";
statusEl.value="Gekauft";
sellPriceEl.value="";
}

function editItem(i){
const item=items[i];
platformEl.value=item.platform;
orderEl.value=item.order;
dateEl.value=item.date;
buyPriceEl.value=item.buy;
statusEl.value=item.status;
sellPriceEl.value=item.sell;
editIndex=i;
window.scrollTo({top:0,behavior:'smooth'});
}

function setFilter(f){filter=f;render();}

function del(i){items.splice(i,1);save();}

function render(){
const body=tableBodyEl;
body.innerHTML='';

const searchText=searchEl.value.toLowerCase();

let totalProfit=0,soldCount=0,stockCount=0,stockValue=0;

items.forEach((item,i)=>{

if(filter!=='all' && item.status!==filter)return;
if(searchText && !item.order.toLowerCase().includes(searchText))return;

const profit=item.sell-item.buy;

if(item.status==='Verkauft'){totalProfit+=profit;soldCount++;}
if(item.status==='Lager'){stockCount++;stockValue+=item.buy;}

body.innerHTML+=`<tr>
<td>${item.image?`<img src="${item.image}">`:''}</td>
<td>${item.platform}</td>
<td>${item.order}</td>
<td>${item.date}</td>
<td>${item.buy.toFixed(2)}€</td>
<td><span class="status-${item.status}">${item.status}</span></td>
<td>${item.sell?item.sell.toFixed(2)+'€':'-'}</td>
<td>${item.sell?profit.toFixed(2)+'€':'-'}</td>
<td>
<button onclick="editItem(${i})">✏️</button>
<button onclick="del(${i})">🗑</button>
</td>
</tr>`;
});

 totalProfitEl=totalProfit.toFixed(2)+'€';
 document.getElementById('totalProfit').innerText=totalProfitEl;
 document.getElementById('soldCount').innerText=soldCount;
 document.getElementById('stockCount').innerText=stockCount;
 document.getElementById('stockValue').innerText=stockValue.toFixed(2)+'€';

renderChart();
}

function renderChart(){
const monthly={};
items.forEach(i=>{
if(i.status==='Verkauft' && i.date){
const m=i.date.slice(0,7);
monthly[m]=(monthly[m]||0)+(i.sell-i.buy);
}
});

const labels=Object.keys(monthly);
const data=Object.values(monthly);

const ctx=document.getElementById('chart');
if(window.chart)window.chart.destroy();

window.chart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'Profit €',data}]}});
}

function downloadBackup(){
let csv="platform,order,date,buy,status,sell,image\n";
items.forEach(i=>{
csv+=`${i.platform},${i.order},${i.date},${i.buy},${i.status},${i.sell},${i.image}\n`;
});
const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;
a.download="resell-backup.csv";
a.click();
}

function uploadBackup(e){
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=function(){
const lines=reader.result.split("\n");
lines.shift();
const imported=[];
lines.forEach(l=>{
if(!l.trim())return;
const [platform,order,date,buy,status,sell,image]=l.split(",");
imported.push({platform,order,date,buy:parseFloat(buy)||0,status,sell:parseFloat(sell)||0,image});
});
items=imported;
save();
alert("Backup geladen");
};
reader.readAsText(file);
}

render();
</script>
</body>
</html>
