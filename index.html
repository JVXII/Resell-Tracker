<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resell Tracker</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f4f6fb;margin:0;padding:30px}
.container{max-width:1000px;margin:auto}
h1{margin-bottom:20px}
.card{background:white;padding:20px;border-radius:14px;box-shadow:0 8px 20px rgba(0,0,0,0.08);margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
input,select,button{padding:10px;border-radius:8px;border:1px solid #ccc;font-size:14px}
button{background:#4f46e5;color:white;border:none;cursor:pointer}
button:hover{opacity:.9}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
th{background:#fafafa}
.profit{font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h1>Resell Tracker</h1>

<div class="card">
<h3>Artikel hinzufügen</h3>
<div class="grid">
<select id="platform">
<option value="eBay">eBay</option>
<option value="Kleinanzeigen">Kleinanzeigen</option>
</select>
<input id="order" placeholder="Bestellnummer" />
<input id="date" type="date" />
<input id="buyPrice" type="number" placeholder="Einkaufspreis €" />
<select id="status">
<option value="Gekauft">Gekauft</option>
<option value="Lager">Lager</option>
<option value="Verkauft">Verkauft</option>
</select>
<input id="sellPrice" type="number" placeholder="Verkaufspreis € (wenn verkauft)" />
<button onclick="addItem()">Speichern</button>
</div>
</div>

<div class="card">
<h3>Artikel Übersicht</h3>
<table>
<thead>
<tr>
<th>Plattform</th>
<th>Bestellnummer</th>
<th>Datum</th>
<th>Einkauf</th>
<th>Status</th>
<th>Verkauf</th>
<th>Profit</th>
<th></th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('resellItems') || '[]');

function save(){
localStorage.setItem('resellItems',JSON.stringify(items));
render();
}

function addItem(){
const item={
platform:document.getElementById('platform').value,
order:document.getElementById('order').value,
date:document.getElementById('date').value,
buy:parseFloat(document.getElementById('buyPrice').value)||0,
status:document.getElementById('status').value,
sell:parseFloat(document.getElementById('sellPrice').value)||0
};

if(item.status==='Verkauft' && !item.sell){
alert('Bitte Verkaufspreis eingeben');
return;
}

items.push(item);
save();
}

function updateStatus(i,val){
items[i].status=val;
if(val!=='Verkauft'){
items[i].sell=0;
}
if(val==='Verkauft'){
let price=prompt('Verkaufspreis eingeben');
items[i].sell=parseFloat(price)||0;
}
save();
}

function del(i){
items.splice(i,1);
save();
}

function render(){
const body=document.getElementById('tableBody');
body.innerHTML='';

items.forEach((item,i)=>{
const profit=item.sell-item.buy;

body.innerHTML+=`
<tr>
<td>${item.platform}</td>
<td>${item.order}</td>
<td>${item.date}</td>
<td>${item.buy.toFixed(2)}€</td>
<td>
<select onchange="updateStatus(${i},this.value)">
<option ${item.status==='Gekauft'?'selected':''}>Gekauft</option>
<option ${item.status==='Lager'?'selected':''}>Lager</option>
<option ${item.status==='Verkauft'?'selected':''}>Verkauft</option>
</select>
</td>
<td>${item.sell?item.sell.toFixed(2)+'€':'-'}</td>
<td class="profit">${item.sell?profit.toFixed(2)+'€':'-'}</td>
<td><button onclick="del(${i})">X</button></td>
</tr>
`;
});
}

render();
</script>
</body>
</html>
